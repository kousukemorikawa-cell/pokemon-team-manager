<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ポケモン構築管理ツール</title>
<style>
:root{
  --bg:#f5f7fb; --card:#fff; --text:#172033; --muted:#6b7280; --line:#dfe3eb;
  --accent:#315efb; --danger:#c62828; --shadow:0 8px 24px rgba(30,41,59,.08);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app{max-width:1280px;margin:0 auto;padding:16px}
.topbar{position:sticky;top:0;z-index:20;background:rgba(245,247,251,.96);backdrop-filter:blur(10px);padding:10px 0 12px}
.title-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
h1{font-size:22px;margin:0;flex:1}.sub{font-size:12px;color:var(--muted)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;color:var(--text)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.danger{color:var(--danger)}
.btn.small{padding:6px 9px;font-size:13px}
.search{flex:1;min-width:220px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.filter.active{outline:2px solid var(--accent)}
.counts{font-size:12px;color:var(--muted);margin-top:8px}
.seasonbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}.seasonbar select{min-width:150px;border:1px solid var(--line);border-radius:10px;padding:9px;background:#fff}.quick-input{grid-column:1/-1;background:#f8faff;border:1px dashed #b8c2d8;border-radius:10px;padding:10px}.quick-input small{display:block;color:var(--muted);margin-top:5px}
.list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.team-row{display:grid;grid-template-columns:minmax(180px,240px) minmax(360px,1fr) auto;gap:12px;align-items:center;background:var(--card);border:2px solid transparent;border-left-width:8px;border-radius:14px;padding:12px;box-shadow:var(--shadow);transition:.15s}
.team-row.dragging{opacity:.55;transform:scale(.995)}
.team-row[data-tag="red"]{border-color:#e53935}.team-row[data-tag="blue"]{border-color:#1e88e5}.team-row[data-tag="green"]{border-color:#43a047}.team-row[data-tag="purple"]{border-color:#8e24aa}
.team-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}.team-meta .wide{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:4px}.field label{font-size:11px;color:var(--muted)}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;background:#fff}
.party{display:grid;grid-template-columns:repeat(6,minmax(52px,1fr));gap:7px;min-width:0}
.mon{border:1px solid var(--line);border-radius:10px;padding:6px;background:#fafbfe;min-width:0;text-align:center}
.mon img{width:100%;aspect-ratio:1/1;object-fit:contain;border-radius:8px;background:#fff;display:block}
.mon-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}
.row-actions{display:flex;flex-direction:column;gap:7px;align-items:stretch}.drag-handle{touch-action:none;font-size:22px;line-height:1;padding:10px 12px}
.tag-btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:#fff;font-size:20px}
.empty{padding:50px 20px;text-align:center;color:var(--muted)}
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal-backdrop.show{display:flex}.sheet{width:min(560px,100%);background:#fff;border-radius:20px 20px 0 0;padding:18px;max-height:82vh;overflow:auto}.sheet h3{margin:0 0 12px}.tag-options{display:grid;gap:8px}.tag-option{display:flex;align-items:center;gap:10px;padding:13px;border:1px solid var(--line);border-radius:12px;background:#fff;text-align:left}.dot{width:16px;height:16px;border-radius:50%}
.view{display:none}.view.active{display:block}
.detail-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}.detail-head h2{margin:0;flex:1;font-size:20px}
.section{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin:12px 0;box-shadow:var(--shadow)}
.section h3{margin:0 0 12px;font-size:17px}.section h4{margin:0 0 8px}
.detail-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.editor-party{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}.editor-mon{border:1px solid var(--line);border-radius:12px;padding:8px;background:#fafbfe}.editor-mon img{width:100%;aspect-ratio:1/1;object-fit:contain;background:#fff;border-radius:8px}.editor-mon input{width:100%;margin-top:6px;border:1px solid var(--line);border-radius:8px;padding:7px}
.image-actions{display:flex;gap:5px;margin-top:6px}.image-actions button{flex:1;font-size:11px;padding:6px}
.cards{display:grid;gap:10px}.memo-card{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fbfcff}.card-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:end;gap:10px}.arrow{font-size:24px;padding-bottom:8px}.preview{display:flex;align-items:center;gap:8px;margin-top:8px}.preview img{width:68px;height:68px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:10px}
textarea{min-height:90px;resize:vertical}.full{width:100%}
.adjust-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}.stats input{text-align:center}
.status-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}.status-row select{min-width:120px}.delete-card{margin-left:auto}
.matchup-party{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:7px;margin:10px 0}.matchup-mon{border:1px solid var(--line);border-radius:10px;padding:6px;background:#fff;text-align:center}.matchup-mon img{width:100%;aspect-ratio:1/1;object-fit:contain;border-radius:8px;background:#fafbfe}.matchup-mon input{width:100%;margin-top:5px;border:1px solid var(--line);border-radius:7px;padding:6px;font-size:12px}.matchup-head{display:grid;grid-template-columns:1fr 1fr;gap:8px}.matchup-search{position:relative;margin-bottom:10px}.matchup-results{display:none;position:absolute;left:0;right:0;top:100%;z-index:15;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);max-height:260px;overflow:auto}.matchup-results.show{display:block}.matchup-result{width:100%;border:0;border-bottom:1px solid var(--line);background:#fff;padding:10px;text-align:left}.matchup-result:last-child{border-bottom:0}.matchup-result small{display:block;color:var(--muted);margin-top:3px}.linked-note{font-size:12px;color:var(--muted);margin:6px 0}.image-guide{font-size:13px;line-height:1.7;background:#f8faff;border:1px dashed #b8c2d8;border-radius:10px;padding:10px}.advantage{border-left:6px solid #2e7d32}.disadvantage{border-left:6px solid #c62828}
.floating-add{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:30;border:0;background:var(--accent);color:#fff;width:56px;height:56px;border-radius:50%;font-size:30px;box-shadow:0 10px 30px rgba(49,94,251,.35)}
.account{display:flex;align-items:center;gap:7px;flex-wrap:wrap}.account img{width:30px;height:30px;border-radius:50%}.sync-state{font-size:12px;color:var(--muted)}
.firebase-help{font-size:13px;color:var(--muted);line-height:1.7}.config-area{width:100%;min-height:180px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#172033;color:#fff;padding:10px 14px;border-radius:10px;opacity:0;pointer-events:none;transition:.2s;z-index:200}.toast.show{opacity:1}
@media(max-width:900px){
 .team-row{grid-template-columns:minmax(0,1fr) auto;gap:9px}.team-meta{grid-column:1/2}.party{grid-column:1/2}.row-actions{grid-column:2/3;grid-row:1/3;align-self:stretch;justify-content:center}.detail-grid{grid-template-columns:repeat(2,1fr)}.editor-party{grid-template-columns:repeat(3,1fr)}.matchup-party{grid-template-columns:repeat(3,1fr)}.adjust-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
 .app{padding:10px}.toolbar .btn{padding:8px 9px;font-size:13px}.team-row{padding:9px;border-radius:12px}.team-meta{grid-template-columns:1fr 1fr}.party{gap:4px}.mon{padding:3px}.mon-name{font-size:9px}.tag-btn{width:40px;height:40px}.drag-handle{padding:10px}.card-grid{grid-template-columns:1fr}.arrow{text-align:center;transform:rotate(90deg);padding:0}.detail-grid,.adjust-grid{grid-template-columns:1fr}.editor-party{grid-template-columns:repeat(2,1fr)}.matchup-party{grid-template-columns:repeat(3,1fr)}.matchup-head{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="app">
  <section id="listView" class="view active">
    <div class="topbar">
      <div class="title-row"><h1>ポケモン構築管理</h1><span class="sub">自分専用・自動保存</span></div>
      <div class="toolbar">
        <input id="searchInput" class="search" placeholder="使用者・順位・構築名・ポケモン名で検索" />
        <button id="newTeamBtn" class="btn primary">＋新規</button>
        <button id="exportBtn" class="btn">書き出し</button>
        <button id="importBtn" class="btn">読み込み</button>
        <input id="importFile" type="file" accept="application/json" hidden />
        <div class="account">
          <span id="syncState" class="sync-state">この端末に保存</span>
          <button id="firebaseSetupBtn" class="btn">Firebase設定</button>
          <button id="loginBtn" class="btn primary">Googleログイン</button>
          <button id="logoutBtn" class="btn" style="display:none">ログアウト</button>
          <img id="userPhoto" alt="" style="display:none">
        </div>
      </div>
      <div class="seasonbar">
        <strong>シーズン</strong>
        <select id="seasonSelect"></select>
        <button id="addSeasonBtn" class="btn small">＋追加</button>
        <button id="renameSeasonBtn" class="btn small">名称変更</button>
        <button id="deleteSeasonBtn" class="btn small danger">削除</button>
      </div>
      <div class="filters" id="filters"></div>
      <div class="counts" id="counts"></div>
    </div>
    <div id="teamList" class="list"></div>
    <button id="floatingAdd" class="floating-add" aria-label="新規構築">＋</button>
  </section>

  <section id="detailView" class="view">
    <div class="detail-head">
      <button id="backBtn" class="btn">← 一覧</button>
      <h2 id="detailTitle">構築詳細</h2>
      <button id="duplicateBtn" class="btn">複製</button>
      <button id="deleteTeamBtn" class="btn danger">削除</button>
    </div>
    <div id="detailContent"></div>
  </section>
</div>

<div id="tagModal" class="modal-backdrop"><div class="sheet"><h3>構築タグを選択</h3><div class="tag-options" id="tagOptions"></div><button class="btn full" id="closeTagModal" style="margin-top:12px">閉じる</button></div></div>
<div id="firebaseModal" class="modal-backdrop"><div class="sheet"><h3>Firebase設定</h3>
  <p class="firebase-help">FirebaseコンソールでWebアプリを登録した際に表示される <code>firebaseConfig</code> の中身を貼り付けてください。設定はこの端末のブラウザだけに保存されます。</p>
  <textarea id="firebaseConfigInput" class="config-area" placeholder='{
  "apiKey": "...",
  "authDomain": "...firebaseapp.com",
  "projectId": "...",
  "storageBucket": "...firebasestorage.app",
  "messagingSenderId": "...",
  "appId": "..."
}'></textarea>
  <div class="toolbar"><button id="saveFirebaseConfig" class="btn primary">設定を保存</button><button id="closeFirebaseModal" class="btn">閉じる</button></div>
  <p class="firebase-help">Googleログインは <code>file://</code> で直接開いたHTMLでは動作しません。Firebase HostingまたはGitHub Pagesなど、HTTPSのURLで開いてください。</p>
</div></div>
<div id="toast" class="toast"></div>

<script>
(() => {
  const DB_NAME='pokemon-team-manager-v1', STORE='app';
  const state={teams:[], imageMap:{}, seasons:['未分類'], currentSeason:'all', filter:'all', query:'', currentId:null};
  const DEFAULT_FIREBASE_CONFIG={
    apiKey:'AIzaSyD08arPFpMjPkTUgKoTs4q1QbxsJWXk1q4',
    authDomain:'pokemon-team-manager-c9895.firebaseapp.com',
    projectId:'pokemon-team-manager-c9895',
    storageBucket:'pokemon-team-manager-c9895.firebasestorage.app',
    messagingSenderId:'459230268500',
    appId:'1:459230268500:web:392b6fbf8bcc83520eb1c1',
    measurementId:'G-E8B12XEVJE'
  };
  const cloud={configured:false,user:null,auth:null,db:null,storage:null,api:null,saving:false};
  let cloudSaveTimer=null;
  const TAGS={
    none:{label:'タグなし',emoji:'⚪',color:'#c7cbd3'},
    red:{label:'現在注目している構築',emoji:'🔴',color:'#e53935'},
    blue:{label:'試したい構築',emoji:'🔵',color:'#1e88e5'},
    green:{label:'上位構築',emoji:'🟢',color:'#43a047'},
    purple:{label:'要研究構築',emoji:'🟣',color:'#8e24aa'}
  };
  const $=s=>document.querySelector(s), uid=()=>crypto.randomUUID?.()||Date.now()+Math.random().toString(16).slice(2);
  let db, saveTimer, dragId=null, tagTargetId=null;

  function openDB(){return new Promise((resolve,reject)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>{db=r.result;resolve()};r.onerror=()=>reject(r.error)})}
  function dbGet(key){return new Promise((resolve,reject)=>{const r=db.transaction(STORE).objectStore(STORE).get(key);r.onsuccess=()=>resolve(r.result);r.onerror=()=>reject(r.error)})}
  function dbSet(key,val){return new Promise((resolve,reject)=>{const r=db.transaction(STORE,'readwrite').objectStore(STORE).put(val,key);r.onsuccess=()=>resolve();r.onerror=()=>reject(r.error)})}
  function payload(){return {teams:state.teams,seasons:state.seasons,currentSeason:state.currentSeason,updatedAt:new Date().toISOString()}}
  function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{await dbSet('data',payload());setSyncText(cloud.user?'端末に保存・クラウド同期中':'この端末に保存');if(cloud.user)scheduleCloudSave();else toast('保存しました')},350)}
  function setSyncText(text){const el=$('#syncState');if(el)el.textContent=text}
  function scheduleCloudSave(){clearTimeout(cloudSaveTimer);cloudSaveTimer=setTimeout(saveCloud,800)}
  async function saveCloud(){if(!cloud.user||!cloud.db||cloud.saving)return;cloud.saving=true;setSyncText('クラウド同期中…');try{const {doc,setDoc,serverTimestamp}=cloud.api;await setDoc(doc(cloud.db,'users',cloud.user.uid,'apps','pokemon-team-manager'),{...payload(),updatedAt:serverTimestamp()},{merge:false});setSyncText('クラウド同期済み');toast('クラウドに保存しました')}catch(e){console.error(e);setSyncText('同期エラー');toast('クラウド同期に失敗しました')}finally{cloud.saving=false}}
  function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),1200)}
  const blankTeam=()=>({id:uid(),user:'',rank:'',season:state.currentSeason==='all'?(state.seasons[0]||'未分類'):state.currentSeason,regulation:'',title:'',oneLine:'',tag:'none',updatedAt:new Date().toISOString(),pokemon:Array(6).fill(''),pokemonChanges:[],moveChanges:[],adjustments:[],favorableMatchups:[],unfavorableMatchups:[],overallMemo:{lead:'',weak:'',improve:'',battle:'',free:''}});
  const imageCandidates=name=>{const n=(name||'').trim();if(!n)return [];const b='images/'+encodeURIComponent(n);return [b+'.png',b+'.webp',b+'.jpg',b+'.jpeg']};
  const imgFor=name=>imageCandidates(name)[0]||placeholder(name);
  function hydrateImages(root=document){root.querySelectorAll('img[data-pokemon]').forEach(img=>{const name=(img.dataset.pokemon||'').trim();const candidates=imageCandidates(name);let i=0;img.onerror=()=>{i++;if(i<candidates.length){img.src=candidates[i];return}const legacy=state.imageMap&&state.imageMap[name];img.onerror=null;img.src=legacy||placeholder(name)};if(!name){img.onerror=null;img.src=placeholder('')}})}
  function placeholder(name){const txt=(name||'?').slice(0,4);return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160"><rect width="160" height="160" rx="18" fill="#eef1f6"/><circle cx="80" cy="65" r="34" fill="#d6dbe5"/><text x="80" y="126" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#677085">${txt}</text></svg>`)}`}
  function esc(v=''){return String(v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
  function setTeam(id,patch){const t=state.teams.find(x=>x.id===id);if(!t)return;Object.assign(t,patch,{updatedAt:new Date().toISOString()});scheduleSave()}


  function renderSeasons(){const sel=$('#seasonSelect');sel.innerHTML=`<option value="all">すべてのシーズン</option>`+state.seasons.map(x=>`<option value="${esc(x)}">${esc(x)}</option>`).join('');sel.value=state.currentSeason;sel.onchange=()=>{state.currentSeason=sel.value;scheduleSave();renderList()}}
  function addSeason(){const name=prompt('追加するシーズン名を入力してください。例：S36');if(!name||!name.trim())return;const n=name.trim();if(state.seasons.includes(n)){alert('同じシーズン名があります。');return}state.seasons.push(n);state.currentSeason=n;scheduleSave();renderSeasons();renderList()}
  function renameSeason(){if(state.currentSeason==='all'){alert('名称変更するシーズンを選択してください。');return}const old=state.currentSeason;const name=prompt('新しいシーズン名',old);if(!name||!name.trim()||name.trim()===old)return;const n=name.trim();if(state.seasons.includes(n)){alert('同じシーズン名があります。');return}state.seasons=state.seasons.map(x=>x===old?n:x);state.teams.forEach(t=>{if((t.season||'未分類')===old)t.season=n});state.currentSeason=n;scheduleSave();renderSeasons();renderList()}
  function deleteSeason(){if(state.currentSeason==='all'){alert('削除するシーズンを選択してください。');return}const old=state.currentSeason;if(!confirm(`「${old}」を削除しますか？構築は「未分類」へ移動します。`))return;if(!state.seasons.includes('未分類'))state.seasons.unshift('未分類');state.teams.forEach(t=>{if((t.season||'未分類')===old)t.season='未分類'});state.seasons=state.seasons.filter(x=>x!==old);state.currentSeason='all';scheduleSave();renderSeasons();renderList()}

  function renderFilters(){const defs=[['all','すべて'],['red','🔴 注目'],['blue','🔵 試したい'],['green','🟢 上位'],['purple','🟣 要研究']];$('#filters').innerHTML=defs.map(([k,l])=>`<button class="btn small filter ${state.filter===k?'active':''}" data-filter="${k}">${l}</button>`).join('');document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;renderList();renderFilters()})}
  function filtered(){const q=state.query.trim().toLowerCase();return state.teams.filter(t=>(state.currentSeason==='all'||(t.season||'未分類')===state.currentSeason)&&(state.filter==='all'||t.tag===state.filter)&&(!q||[t.user,t.rank,t.title,t.season,t.regulation,...t.pokemon].join(' ').toLowerCase().includes(q)))}
  function renderList(){const list=filtered();$('#counts').textContent=`${state.currentSeason==='all'?'全シーズン':state.currentSeason}：全${state.teams.filter(t=>state.currentSeason==='all'||(t.season||'未分類')===state.currentSeason).length}件 ／ 表示${list.length}件　${Object.entries(TAGS).slice(1).map(([k,v])=>`${v.emoji}${state.teams.filter(t=>t.tag===k).length}`).join(' ')}`;$('#teamList').innerHTML=list.length?list.map(teamRowHTML).join(''):'<div class="empty">構築がありません。「＋新規」から追加してください。</div>';hydrateImages($('#teamList'));bindRows()}
  function teamRowHTML(t){return `<article class="team-row" data-id="${t.id}" data-tag="${t.tag}">
    <div class="team-meta">
      <div class="field"><label>使用者</label><input data-k="user" value="${esc(t.user)}" placeholder="使用者"></div>
      <div class="field"><label>順位</label><input data-k="rank" value="${esc(t.rank)}" placeholder="最終○位"></div>
      <div class="field wide"><label>構築名</label><input data-k="title" value="${esc(t.title)}" placeholder="構築名・軸"></div>
      <button class="btn small detail-btn wide">詳細を見る</button>
    </div>
    <div class="party">${t.pokemon.map(n=>`<div class="mon"><img data-pokemon="${esc(n)}" src="${imgFor(n)}"><div class="mon-name">${esc(n||'未登録')}</div></div>`).join('')}</div>
    <div class="row-actions"><button class="tag-btn" title="タグ">${TAGS[t.tag||'none'].emoji}</button><button class="btn drag-handle" title="長押しして並べ替え">≡</button></div>
  </article>`}
  function bindRows(){document.querySelectorAll('.team-row').forEach(row=>{const id=row.dataset.id;row.querySelectorAll('[data-k]').forEach(inp=>inp.oninput=()=>setTeam(id,{[inp.dataset.k]:inp.value}));row.querySelector('.detail-btn').onclick=()=>openDetail(id);row.querySelector('.tag-btn').onclick=()=>openTag(id);const h=row.querySelector('.drag-handle');h.onpointerdown=e=>startDrag(e,id,row);});}

  function normalizeFirebaseConfig(text){
    let v=text.trim();
    v=v.replace(/^const\s+firebaseConfig\s*=\s*/, '').replace(/^firebaseConfig\s*=\s*/, '').replace(/;\s*$/, '');
    v=v.replace(/([{,]\s*)([A-Za-z_$][\w$]*)(\s*:)/g,'$1"$2"$3').replace(/'/g,'"');
    return JSON.parse(v);
  }
  async function loadFirebaseSdk(){
    if(cloud.api)return;
    const v='12.0.0';
    const app=await import(`https://www.gstatic.com/firebasejs/${v}/firebase-app.js`);
    const auth=await import(`https://www.gstatic.com/firebasejs/${v}/firebase-auth.js`);
    const fs=await import(`https://www.gstatic.com/firebasejs/${v}/firebase-firestore.js`);
    cloud.api={...app,...auth,...fs};
  }
  async function initFirebase(config){
    await loadFirebaseSdk();
    const {initializeApp,getApps,getApp,getAuth,GoogleAuthProvider,onAuthStateChanged,getFirestore}=cloud.api;
    const app=getApps().length?getApp():initializeApp(config);
    cloud.auth=getAuth(app);cloud.db=getFirestore(app);cloud.storage=null;cloud.configured=true;
    onAuthStateChanged(cloud.auth,async user=>{cloud.user=user||null;updateAccountUI();if(user)await loadCloudData()});
  }
  function updateAccountUI(){
    const logged=!!cloud.user;$('#loginBtn').style.display=logged?'none':'';$('#logoutBtn').style.display=logged?'':'none';
    $('#userPhoto').style.display=logged&&cloud.user.photoURL?'':'none';if(logged&&cloud.user.photoURL)$('#userPhoto').src=cloud.user.photoURL;
    setSyncText(logged?`${cloud.user.displayName||'Google'}・同期準備中`:(cloud.configured?'未ログイン':'この端末に保存'));
  }
  async function loginGoogle(){
    if(location.protocol==='file:'){alert('GoogleログインはHTMLを直接開いた状態では使えません。Firebase HostingまたはGitHub Pagesに公開してから開いてください。');return}
    if(!cloud.configured){openFirebaseModal();return}
    try{const {GoogleAuthProvider,signInWithPopup}=cloud.api;await signInWithPopup(cloud.auth,new GoogleAuthProvider())}catch(e){console.error(e);alert('Googleログインに失敗しました。Firebase AuthenticationでGoogleを有効にし、現在のドメインを承認済みドメインに追加してください。')}
  }
  async function logoutGoogle(){if(cloud.auth){await cloud.api.signOut(cloud.auth);setSyncText('この端末に保存')}}
  async function loadCloudData(){
    try{const {doc,getDoc}=cloud.api;const snap=await getDoc(doc(cloud.db,'users',cloud.user.uid,'apps','pokemon-team-manager'));
      if(snap.exists()){
        const d=snap.data();
        const localHas=state.teams.length>0;
        const useCloud=!localHas||confirm('クラウドに保存済みのデータがあります。クラウド版をこの端末に読み込みますか？\n\n「キャンセル」を選ぶと、この端末のデータをクラウドへ上書きします。');
        if(useCloud){state.teams=d.teams||[];state.seasons=d.seasons||['未分類'];state.currentSeason=d.currentSeason||'all';await dbSet('data',payload());normalizeState();renderSeasons();renderFilters();renderList();if(state.currentId)renderDetail();toast('クラウドデータを読み込みました')}
        else await migrateLocalImagesAndSave();
      }else await migrateLocalImagesAndSave();
      setSyncText('クラウド同期済み');
    }catch(e){console.error(e);setSyncText('クラウド読込エラー');alert('クラウドデータを読み込めませんでした。Firestoreの作成とセキュリティルールを確認してください。')}
  }

  function openFirebaseModal(){const saved=localStorage.getItem('pokemonFirebaseConfig');$('#firebaseConfigInput').value=saved?JSON.stringify(JSON.parse(saved),null,2):'';$('#firebaseModal').classList.add('show')}
  async function saveFirebaseConfig(){try{const c=normalizeFirebaseConfig($('#firebaseConfigInput').value);for(const k of ['apiKey','authDomain','projectId','appId'])if(!c[k])throw new Error(k);localStorage.setItem('pokemonFirebaseConfig',JSON.stringify(c));$('#firebaseModal').classList.remove('show');await initFirebase(c);toast('Firebase設定を保存しました')}catch(e){console.error(e);alert('設定を読み取れませんでした。firebaseConfigのオブジェクトをそのまま貼り付けてください。')}}
  function normalizeState(){state.seasons=Array.isArray(state.seasons)&&state.seasons.length?state.seasons:['未分類'];state.teams=Array.isArray(state.teams)?state.teams:[];state.imageMap=state.imageMap||{};state.teams.forEach(t=>{t.season=t.season||'未分類';if(!state.seasons.includes(t.season))state.seasons.push(t.season);t.pokemon=t.pokemon||Array(6).fill('');t.pokemonChanges=t.pokemonChanges||[];t.moveChanges=t.moveChanges||[];t.adjustments=t.adjustments||[];t.favorableMatchups=(t.favorableMatchups||[]).map(x=>({...x,_key:'favorableMatchups',linkedTeamId:x.linkedTeamId||'',pokemon:Array.isArray(x.pokemon)?Array.from({length:6},(_,i)=>x.pokemon[i]||''):Array(6).fill('')}));t.unfavorableMatchups=(t.unfavorableMatchups||[]).map(x=>({...x,_key:'unfavorableMatchups',linkedTeamId:x.linkedTeamId||'',pokemon:Array.isArray(x.pokemon)?Array.from({length:6},(_,i)=>x.pokemon[i]||''):Array(6).fill('')}));t.overallMemo=t.overallMemo||{lead:'',weak:'',improve:'',battle:'',free:''}})}
  async function init(){await openDB();const saved=await dbGet('data');if(saved){state.teams=saved.teams||[];state.imageMap=saved.imageMap||{};state.seasons=saved.seasons||['未分類'];state.currentSeason=saved.currentSeason||'all'}normalizeState();renderSeasons();renderFilters();renderList();$('#searchInput').oninput=e=>{state.query=e.target.value;renderList()};$('#newTeamBtn').onclick=$('#floatingAdd').onclick=addTeam;$('#addSeasonBtn').onclick=addSeason;$('#renameSeasonBtn').onclick=renameSeason;$('#deleteSeasonBtn').onclick=deleteSeason;$('#backBtn').onclick=backToList;$('#duplicateBtn').onclick=duplicateCurrent;$('#deleteTeamBtn').onclick=deleteCurrent;$('#exportBtn').onclick=exportData;$('#importBtn').onclick=()=>$('#importFile').click();$('#importFile').onchange=e=>importData(e.target.files[0]);$('#closeTagModal').onclick=()=>$('#tagModal').classList.remove('show');$('#tagModal').onclick=e=>{if(e.target===$('#tagModal'))$('#tagModal').classList.remove('show')};
    $('#firebaseSetupBtn').onclick=openFirebaseModal;$('#loginBtn').onclick=loginGoogle;$('#logoutBtn').onclick=logoutGoogle;$('#saveFirebaseConfig').onclick=saveFirebaseConfig;$('#closeFirebaseModal').onclick=()=>$('#firebaseModal').classList.remove('show');$('#firebaseModal').onclick=e=>{if(e.target===$('#firebaseModal'))$('#firebaseModal').classList.remove('show')};
    const cfg=localStorage.getItem('pokemonFirebaseConfig');try{await initFirebase(cfg?JSON.parse(cfg):DEFAULT_FIREBASE_CONFIG)}catch(e){console.error(e);setSyncText('Firebase設定エラー')}
  }
  init().catch(e=>{console.error(e);alert('データベースの初期化に失敗しました。プライベートブラウズでは保存できない場合があります。')});
})();
</script>
</body>
